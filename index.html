<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מצגת תמונות ווידאו חכמה</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: sans-serif;
        }

        .swiper { width: 100%; height: 100%; }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* שחור נקי, בלי כחול */
        }

        .photo, video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease-in-out;
        }

        .rotate-90 { transform: rotate(90deg); }

        /* כפתורי שליטה שמופיעים רק בנגיעה */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        body:hover .controls, body:active .controls { opacity: 1; }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loader">טוען את המדיה...</div>

    <div class="swiper">
        <div class="swiper-wrapper" id="image-container"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="rotateCurrent()">סובב 🔄</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">עצור ⏸️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- הגדרות חיבור ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwamj-EaTHTRcEU7u_U5ennR55hZ6H0eDHGB5E0H0WmAqabDSrOGQFMLD0SvaMS2GP4dg/exec";
        const KEY = "1234";
        const REPO_URL = "https://adielkapah.github.io/slideshow/"; 
        // --------------------

        let swiper;
        let slideTimeout;

        async function fetchMedia() {
            try {
                const response = await fetch(`${SCRIPT_URL}?key=${KEY}`);
                const items = await response.json();
                
                if (items && items.length > 0) {
                    renderSlideshow(items);
                    document.getElementById('loader').style.display = 'none';
                } else {
                    document.getElementById('loader').innerText = "לא נמצאה מדיה באלבום.";
                }
            } catch (error) {
                document.getElementById('loader').innerText = "שגיאה בחיבור לסקריפט.";
            }
        }

        function renderSlideshow(items) {
            const container = document.getElementById('image-container');
            container.innerHTML = items.map(item => {
                const isVideo = item.isVideo || item.url.includes('video');
                return `
                    <div class="swiper-slide" data-is-video="${isVideo}">
                        ${isVideo ? 
                            `<video src="${item.url}=dv" class="photo" muted playsinline></video>` : 
                            `<img src="${item.url}=w2048" class="photo">`
                        }
                    </div>
                `;
            }).join('');

            swiper = new Swiper('.swiper', {
                loop: true,
                speed: 1000,
                on: {
                    init: function() { handleSlideChange(this); },
                    slideChange: function() { handleSlideChange(this); }
                }
            });
        }

        function handleSlideChange(s) {
            const activeSlide = s.slides[s.activeIndex];
            if (!activeSlide) return;

            const isVideo = activeSlide.getAttribute('data-is-video') === 'true';
            const video = activeSlide.querySelector('video');

            if (slideTimeout) clearTimeout(slideTimeout);

            if (isVideo && video) {
                video.currentTime = 0;
                video.play().catch(e => console.log("Auto-play blocked"));
                video.onended = () => { s.slideNext(); };
            } else {
                slideTimeout = setTimeout(() => {
                    if (s.autoplay && !s.autoplay.running) return; 
                    s.slideNext();
                }, 3000);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playPauseBtn');
            if (slideTimeout || document.querySelector('video')) {
                // לוגיקה פשוטה לעצירה: אם יש טיימר, נבטל אותו
                clearTimeout(slideTimeout);
                slideTimeout = null;
                btn.innerText = "נגן ▶️";
            } else {
                location.reload(); // רענון פשוט להחזרת הריצה
            }
        }

        function rotateCurrent() {
            const activeSlide = document.querySelector('.swiper-slide-active .photo');
            if (activeSlide) activeSlide.classList.toggle('rotate-90');
        }

        fetchMedia();
    </script>
</body>
</html>
