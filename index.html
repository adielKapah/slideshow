<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Tablet Frame</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s; }
        
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111;
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        
        .rotate-90 { transform: rotate(90deg); }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>הזן סיסמה לצפייה</h2>
    <input type="password" id="pass-input" placeholder="סיסמה...">
    <button onclick="startGallery()">כניסה</button>
</div>

<div class="swiper">
    <div class="swiper-wrapper" id="gallery-wrapper">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    let swiper;
    const GAS_URL = "YOUR_APPS_SCRIPT_URL_HERE"; // כתובת ה-Web App שפרסמת

    async function startGallery() {
        const pass = document.getElementById('pass-input').value;
        const overlay = document.getElementById('login-overlay');

        try {
            const response = await fetch(`${GAS_URL}?pass=${pass}`);
            const data = await response.json();
            
            if (data === "Unauthorized") return alert("סיסמה שגויה");
            
            overlay.style.display = 'none';
            renderGallery(data);
        } catch (e) {
            alert("שגיאה בטעינת נתונים. וודא שהסיסמה נכונה והסקריפט מפורסם.");
        }
    }

    function renderGallery(items) {
        const wrapper = document.getElementById('gallery-wrapper');
        items.forEach(item => {
            const slide = document.createElement('div');
            slide.className = 'swiper-slide';
            
            let media;
            if (item.isVideo) {
                media = document.createElement('video');
                media.src = item.url;
                media.controls = false;
                media.loop = true;
            } else {
                media = document.createElement('img');
                media.src = item.url;
            }
            
            // לחיצה ארוכה או לחיצה כפולה לסיבוב 90 מעלות
            media.onclick = (e) => {
                // לחיצה באמצע (עצירה/הפעלה)
                if (swiper.autoplay.running) swiper.autoplay.stop();
                else swiper.autoplay.start();
            };

            media.ondblclick = () => {
                media.classList.toggle('rotate-90');
            };

            slide.appendChild(media);
            wrapper.appendChild(slide);
        });

        initSwiper();
    }

    function initSwiper() {
        swiper = new Swiper('.swiper', {
            loop: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            effect: 'fade', // מעבר חלק
            on: {
                slideChangeTransitionStart: function () {
                    // עצירת כל הוידאוים וניגון רק של הנוכחי
                    document.querySelectorAll('video').forEach(v => v.pause());
                    const activeSlide = this.slides[this.activeIndex];
                    const video = activeSlide.querySelector('video');
                    if (video) {
                        video.play();
                        this.autoplay.stop(); // עצור טיימר כשיש וידאו
                        video.onended = () => this.slideNext(); 
                    } else {
                        this.autoplay.start();
                    }
                }
            }
        });
    }
</script>
</body>
</html>
