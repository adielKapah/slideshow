<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מסגרת תמונות חכמה</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: sans-serif;
        }

        .swiper { width: 100%; height: 100%; }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* הגדרות התמונה */
        .photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.4s ease-in-out;
        }

        /* מחלקת סיבוב ב-90 מעלות */
        .rotate-90 {
            transform: rotate(90deg);
        }

        /* כפתורי שליטה צפים (יופיעו רק כשנוגעים במסך) */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        .controls:hover { opacity: 1; }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* הודעת טעינה */
        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loader">מתחבר לאלבום ותולש תמונות...</div>

    <div class="swiper">
        <div class="swiper-wrapper" id="image-container">
            </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="rotateCurrent()">סובב תמונה 🔄</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">עצור ⏸️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // --- הגדרות אישיות (חובה לעדכן!) ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzo9i8NKvs0pmwX56EcdtRL5fWG0aOZqGk44Xc0zp_Uj8g5x0gsjVUx168SbCgWPfs4-Q/exec";
        const KEY = "1234";
        // ----------------------------------

        let swiper;

        async function fetchImages() {
            try {
                const response = await fetch(`${SCRIPT_URL}?key=${KEY}`);
                const images = await response.json();
                
                if (images && images.length > 0) {
                    renderSlideshow(images);
                    document.getElementById('loader').style.display = 'none';
                } else {
                    document.getElementById('loader').innerText = "לא נמצאו תמונות באלבום.";
                }
            } catch (error) {
                console.error("Error fetching images:", error);
                document.getElementById('loader').innerText = "שגיאה בחיבור לשרת.";
            }
        }

        function renderSlideshow(imageUrls) {
            const container = document.getElementById('image-container');
            container.innerHTML = imageUrls.map(url => `
                <div class="swiper-slide">
                    <img src="${url}" class="photo">
                </div>
            `).join('');

            // אתחול הקרוסלה
            swiper = new Swiper('.swiper', {
                loop: true,
                speed: 1000,
                autoplay: {
                    delay: 3000, // מעבר כל 3 שניות
                    disableOnInteraction: false,
                },
                navigation: {
                    nextEl: null,
                    prevEl: null,
                },
                // לחיצה באמצע עוצרת/מפעילה
                on: {
                    click: function () {
                        togglePlay();
                    }
                }
            });
        }

        function togglePlay() {
            const btn = document.getElementById('playPauseBtn');
            if (swiper.autoplay.running) {
                swiper.autoplay.stop();
                btn.innerText = "הפעל ▶️";
            } else {
                swiper.autoplay.start();
                btn.innerText = "עצור ⏸️";
            }
        }

        function rotateCurrent() {
            const activeSlide = document.querySelector('.swiper-slide-active .photo');
            if (activeSlide) {
                activeSlide.classList.toggle('rotate-90');
            }
        }

        // הפעלה ראשונית
        fetchImages();
    </script>
</body>
</html>
