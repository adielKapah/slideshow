<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המסגרת הדיגיטלית שלי</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; color: white;
            font-family: sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #login-screen {
            display: flex; flex-direction: column; gap: 10px; z-index: 10;
        }
        input, button { padding: 10px; font-size: 18px; }
        #media-container {
            width: 100%; height: 100%; display: none;
            justify-content: center; align-items: center; position: relative;
        }
        .media-item {
            max-width: 100%; max-height: 100%;
            object-fit: contain; transition: transform 0.3s ease;
        }
        #controls {
            position: absolute; bottom: 20px; right: 20px; z-index: 5;
            display: flex; gap: 15px;
        }
        .control-btn {
            background: rgba(0,0,0,0.5); color: white; border: 1px solid white;
            padding: 10px; border-radius: 5px; cursor: pointer; font-size: 16px;
        }
        #status-msg { position: absolute; top: 20px; font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>הכנס סיסמה למסגרת:</h2>
        <input type="password" id="password-input" placeholder="סיסמה...">
        <button onclick="startApp()">התחבר</button>
        <div id="error-msg" style="color: red;"></div>
    </div>

    <div id="status-msg"></div>

    <div id="media-container">
        <div id="controls">
            <button class="control-btn" id="rotate-btn" onclick="rotateCurrentMedia()">🔄 סובב 90°</button>
        </div>
    </div>

    <script>
        // --- הגדרות ---
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNRp_KH3f-qt9fi4ODxy2EK3KChQJl0VJgxfFkXeg3uuSVpJQd6mVokOfsa7Rp-CoQhw/exec'; 
        const SLIDE_DURATION = 3000; // 3 שניות לתמונה
        
        let mediaData = [];
        let currentIndex = 0;
        let isPlaying = true;
        let slideTimer;
        let currentElement = null;

        // משתנים לזיהוי החלקה (Swipe)
        let touchStartX = 0;
        let touchEndX = 0;

        async function startApp() {
            const pass = document.getElementById('password-input').value;
            if(!pass) return;

            document.getElementById('error-msg').innerText = "טוען נתונים...";
            
            try {
                // הוספת redirect: 'follow' עוזרת לדפדפן להתמודד עם הפניות של גוגל
                const response = await fetch(`${APPS_SCRIPT_URL}?pass=${encodeURIComponent(pass)}`, { redirect: 'follow' });
                const result = await response.json();

                if (result.error) {
                    // הצגת השגיאה האמיתית שמגיעה מהשרת
                    document.getElementById('error-msg').innerText = result.error.includes("Incorrect Password") ? "סיסמה שגויה!" : result.error;
                } else if (result.success && result.data.length > 0) {
                    mediaData = result.data;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('media-container').style.display = 'flex';
                    setupTouchEvents();
                    setupClickEvent();
                    showMedia(currentIndex);
                } else {
                    document.getElementById('error-msg').innerText = "לא נמצאו תמונות באלבום.";
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('error-msg').innerText = "שגיאת תקשורת. בדוק את מסוף המפתחים (F12).";
            }
        }
        function showMedia(index) {
            clearTimeout(slideTimer); // עצירת הטיימר הקודם
            const container = document.getElementById('media-container');
            const item = mediaData[index];
            
            // הסרת האלמנט הקודם (אם קיים)
            if (currentElement) {
                currentElement.remove();
            }

            // שליפת זווית הסיבוב מהזיכרון המקומי
            let rotation = localStorage.getItem('rot_' + item.id) || 0;

            if (item.type === 'video') {
                currentElement = document.createElement('video');
                currentElement.src = item.url;
                currentElement.autoplay = true;
                currentElement.controls = false; 
                currentElement.muted = false; // כיוון שהמשתמש כבר לחץ במסך כדי להכניס סיסמה, ניתן להפעיל שמע
                
                // כשהסרטון מסתיים - עבור לבא
                currentElement.onended = () => { if(isPlaying) nextSlide(); };
                
                // טיפול בשגיאות טעינת סרטון
                currentElement.onerror = () => { if(isPlaying) nextSlide(); };

            } else {
                currentElement = document.createElement('img');
                currentElement.src = item.url;
                
                // אם זה תמונה וכרגע מנגנים, הפעל טיימר ל-3 שניות
                if (isPlaying) {
                    slideTimer = setTimeout(nextSlide, SLIDE_DURATION);
                }
            }

            currentElement.className = 'media-item';
            currentElement.style.transform = `rotate(${rotation}deg)`;
            
            // הוספת האלמנט למסך (לפני כפתורי השליטה)
            container.insertBefore(currentElement, document.getElementById('controls'));
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % mediaData.length;
            showMedia(currentIndex);
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + mediaData.length) % mediaData.length;
            showMedia(currentIndex);
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            document.getElementById('status-msg').innerText = isPlaying ? "" : "⏸️ הושהה";
            
            if (isPlaying) {
                if (mediaData[currentIndex].type === 'image') {
                    nextSlide(); // מעבר מיידי וחידוש הריצה
                } else if (currentElement && currentElement.tagName === 'VIDEO') {
                    currentElement.play();
                }
            } else {
                clearTimeout(slideTimer);
                if (currentElement && currentElement.tagName === 'VIDEO') {
                    currentElement.pause();
                }
            }
        }

        function rotateCurrentMedia() {
            const item = mediaData[currentIndex];
            let currentRot = parseInt(localStorage.getItem('rot_' + item.id) || '0');
            currentRot = (currentRot + 90) % 360;
            
            // שמירה בזיכרון והחלה על האלמנט
            localStorage.setItem('rot_' + item.id, currentRot);
            if(currentElement) {
                currentElement.style.transform = `rotate(${currentRot}deg)`;
            }
        }

        // --- ניהול אירועי מגע (החלקה) ---
        function setupTouchEvents() {
            const container = document.getElementById('media-container');
            container.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            container.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
        }

        function handleSwipe() {
            const threshold = 50; // מינימום מרחק כדי להחשב כהחלקה
            if (touchEndX < touchStartX - threshold) {
                // החלקה שמאלה (תמונה הבאה)
                nextSlide();
            } else if (touchEndX > touchStartX + threshold) {
                // החלקה ימינה (תמונה קודמת)
                prevSlide();
            }
        }

        // --- לחיצה במרכז המסך ---
        function setupClickEvent() {
            const container = document.getElementById('media-container');
            container.addEventListener('click', function(e) {
                // מונע מהלחיצה על כפתור הסיבוב לעצור את התצוגה
                if(e.target.tagName !== 'BUTTON') {
                    togglePlayPause();
                }
            });
        }
    </script>
</body>
</html>
